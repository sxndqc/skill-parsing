name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The project is dependency-free; nothing to install.
      - name: Smoke tests
        run: python tests/test_smoke.py
      - name: Parse the sample corpus (CLI smoke)
        run: python harness.py --file examples/sample_sentences.txt
